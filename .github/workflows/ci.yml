name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Spin up real SQL Server for integration tests
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: Marketplace_Dev1
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Marketplace_Dev1 -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

      # Spin up real MongoDB for integration tests
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests
        run: dotnet test --no-build -c Release --verbosity normal
        env:
          ConnectionStrings__SqlServer: "Server=localhost;Database=MarketplaceDB_Test;User Id=sa;Password=Marketplace_Dev1;TrustServerCertificate=True"
          ConnectionStrings__MongoDB: "mongodb://localhost:27017"
          Jwt__Key: "ci_test_secret_key_32_characters_x"
          Jwt__Issuer: "MarketplaceAPI"

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./MarketplaceAPI
          push: true
          tags: |
            ghcr.io/fahad-yussuf/marketplace-api:latest
            ghcr.io/fahad-yussuf/marketplace-api:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./MarketplaceClient
          push: true
          tags: |
            ghcr.io/fahad-yussuf/marketplace-api:latest
            ghcr.io/fahad-yussuf/marketplace-api:${{ github.sha }}
